# Qt_Vision 统一配置文件 (地面站与边缘端共用)

# 1. 公共网络拓扑配置 (任何一端修改，全系统同步生效)
network:
  host_ip: "192.168.127.1"      # 上位机/地面站 IP
  edge_ip: "192.168.127.10"     # 边缘端/车载板卡 IP
  video_port: 8888              # 视频流端口
  control_port: 8890            # 控制指令端口
  status_port: 8888             # 状态心跳端口
  reconnect_ms: 3000            # 重连超时时间 (ms)

# 2. 边缘端 (Edge) 专用配置 (地面站程序读取时直接忽略即可)
camera:
  width: 1280
  height: 720
  fps: 45

algorithm:
  hsv:
    h_min: 30
    h_max: 150